<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Build My Squad · HALLO AMRIKA</title>
<link rel="stylesheet" href="styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

<header class="topbar">
  <a href="index.html" class="brand">
    <span class="brand-mark" data-i18n="brand.mark">HALLO AMRIKA</span>
  </a>
  <nav class="hdr-tabs">
    <a href="index.html" class="hdr-tab" data-i18n="tab.home">Home</a>
    <a href="team.html"  class="hdr-tab active" data-i18n="tab.team">My Team</a>
  </nav>
  <div class="hdr-right">
    <button class="hdr-btn" id="langToggle" title="عربي / English">عربي</button>
    <span id="authSlot" class="auth-slot-inline"></span>
  </div>
</header>

<main class="build">
  <section class="build-left">

    <div class="build-card">
      <h3 data-i18n="build.randomizer">The Randomizer</h3>
      <div class="spinner-display">
        <div class="spinner-box flag" id="reelNation">
          <span class="lbl" data-i18n="reel.nation">NATION</span>
          <span class="val" id="reelNationVal">🌍</span>
        </div>
        <div class="spinner-box role" id="reelRole">
          <span class="lbl" data-i18n="reel.role">POSITION</span>
          <span class="val" id="reelRoleVal">—</span>
        </div>
      </div>
      <button class="spin-action" id="spinBtn" data-i18n="spin">SPIN</button>
      <p class="spin-hint" id="spinHint" data-i18n="spin.hint">12 picks total. Each spin draws a nation; then pick a position bucket and a player.</p>
    </div>

    <div class="build-card" id="candidatesCard" style="display:none;">
      <h3><span data-i18n="pick.player">Pick a player —</span> <span id="candHead" style="color:var(--text);text-transform:none;letter-spacing:0;font-size:15px;font-weight:800;"></span></h3>
      <div class="candidates" id="candidates"></div>
    </div>

    <div class="build-card" id="slotChooserCard" style="display:none;">
      <h3><span id="slotChooserHead" style="color:var(--text);text-transform:none;letter-spacing:0;font-size:15px;font-weight:800;"></span></h3>
      <div class="bucket-grid" id="slotChooserGrid"></div>
    </div>

  </section>

  <section class="build-right">
    <div class="build-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 data-i18n="squad.build.title">Squad — 4-4-2</h3>
        <span class="wildcard-help" id="wildcardHelp" title="" data-i18n-title="wildcard.help">?</span>
      </div>
      <div class="pitch-wrap">
        <div class="pitch442" id="pitch442"></div>
        <div class="bench" id="bench"></div>
      </div>
    </div>

    <div class="build-card">
      <h3 data-i18n="categories">Categories (max 2 each)</h3>
      <div class="cat-status-grid" id="catStatus"></div>
    </div>

    <div class="build-card">
      <h3 data-i18n="status">Status</h3>
      <div id="constraints"></div>
    </div>

    <div class="build-card" id="subInCard" style="display:none;">
      <h3 data-i18n="subin.title">Sub In Wildcard</h3>
      <div id="subInList"></div>
    </div>

    <div class="build-card">
      <h3 data-i18n="submit.title">Submit</h3>
      <div class="submit-row">
        <input class="team-name-input" id="teamName" data-i18n-placeholder="submit.placeholder" placeholder="Team name…" maxlength="40" />
        <button class="submit-btn" id="submitBtn" data-i18n="submit.btn" disabled>Submit Squad</button>
      </div>
      <div class="submit-msg" id="submitMsg"></div>
    </div>
  </section>
</main>

<script type="module" src="js/i18n.js"></script>
<script type="module" src="build.js"></script>
</body>
</html>
