<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>League · WC26 XI</title>
<link rel="stylesheet" href="styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
<header class="topbar">
  <a href="index.html" class="brand">
    <span class="brand-mark">WC26</span>
    <span class="brand-sub">Build Your World Cup XI</span>
  </a>
  <div class="hdr-right" id="authSlot"></div>
</header>

<section class="setup">
  <div class="setup-inner" style="max-width:760px;">
    <h1 class="setup-title" id="leagueTitle">League</h1>
    <p class="setup-sub" id="leagueSub"></p>

    <div class="setup-step">
      <div class="setup-step-label">Invite</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="inviteUrl" readonly
               style="flex:1;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:monospace;" />
        <button class="ghost-btn" id="copyInvite" style="margin:0;">Copy</button>
      </div>
    </div>

    <div class="setup-step">
      <div class="setup-step-label">Your entry</div>
      <div id="myEntryBox"></div>
    </div>

    <div class="setup-step">
      <div class="setup-step-label">Leaderboard</div>
      <div id="leaderboard" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
  </div>
</section>

<script type="module">
import { supabase } from './js/supabase-client.js';
import { mountAuthWidget, currentUser } from './js/auth.js';

const params = new URLSearchParams(location.search);
const code = (params.get('code') || '').toUpperCase();

async function init() {
  await mountAuthWidget(document.getElementById('authSlot'));
  if (!code) { document.body.innerHTML = '<p style="padding:30px;">Missing league code.</p>'; return; }

  const { data: league, error } = await supabase
    .from('leagues').select('*').eq('code', code).single();
  if (error || !league) {
    document.body.innerHTML = `<p style="padding:30px;color:var(--danger);">League not found: ${code}</p>`;
    return;
  }

  document.getElementById('leagueTitle').textContent = league.name;
  const locked = new Date(league.locked_at) < new Date();
  document.getElementById('leagueSub').innerHTML =
    `Code <code>${league.code}</code> · ${locked ? '<b style="color:var(--danger);">Locked</b>' : 'Open for submissions until ' + new Date(league.locked_at).toLocaleString()}`;

  document.getElementById('inviteUrl').value = `${location.origin}${location.pathname}?code=${league.code}`;
  document.getElementById('copyInvite').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('inviteUrl').value);
    document.getElementById('copyInvite').textContent = 'Copied!';
    setTimeout(() => document.getElementById('copyInvite').textContent = 'Copy', 1500);
  };

  const user = await currentUser();
  await renderMyEntry(league, user, locked);
  await renderLeaderboard(league);

  // Auto-join if logged in and not yet member
  if (user) {
    await supabase.from('league_members').insert({ league_id: league.id, user_id: user.id });
  }
}

async function renderMyEntry(league, user, locked) {
  const box = document.getElementById('myEntryBox');
  if (!user) {
    box.innerHTML = `<a href="login.html" class="setup-start" style="display:inline-block;text-decoration:none;">Sign in to submit your XI</a>`;
    return;
  }
  const { data: entry } = await supabase
    .from('entries').select('*').eq('league_id', league.id).eq('user_id', user.id).maybeSingle();
  if (entry) {
    box.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;">
        <div style="font-weight:800;">${escapeHtml(entry.team_name)} <span style="color:var(--text-dim);font-weight:400;">· ${entry.formation}</span></div>
        <div style="color:var(--text-dim);font-size:12px;margin-top:4px;">Submitted ${new Date(entry.submitted_at).toLocaleString()}</div>
        ${locked ? '' : `<a href="index.html?league=${encodeURIComponent(league.code)}" class="ghost-btn" style="margin-top:10px;display:inline-block;text-decoration:none;">Re-draft my XI</a>`}
      </div>`;
  } else if (locked) {
    box.innerHTML = `<div style="color:var(--text-dim);">Submissions are closed. You didn't submit an XI for this league.</div>`;
  } else {
    box.innerHTML = `<a href="index.html?league=${encodeURIComponent(league.code)}" class="setup-start" style="display:inline-block;text-decoration:none;">Draft my XI →</a>`;
  }
}

async function renderLeaderboard(league) {
  const { data: entries } = await supabase
    .from('entries').select('id, team_name, formation, user_id, submitted_at')
    .eq('league_id', league.id);

  // Optional: pull profile display_names
  const ids = (entries || []).map(e => e.user_id);
  let profiles = {};
  if (ids.length) {
    const { data: profs } = await supabase
      .from('profiles').select('id, email, display_name').in('id', ids);
    for (const p of profs || []) profiles[p.id] = p;
  }

  // Optional: total points (scores table; may be empty pre-Phase-3)
  let totals = {};
  if (ids.length) {
    const { data: scores } = await supabase
      .from('scores').select('entry_id, points').in('entry_id', (entries || []).map(e => e.id));
    for (const s of scores || []) totals[s.entry_id] = (totals[s.entry_id] || 0) + s.points;
  }

  const lb = document.getElementById('leaderboard');
  if (!entries || !entries.length) {
    lb.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px;">No entries yet.</div>';
    return;
  }
  const rows = entries
    .map(e => ({ ...e, points: totals[e.id] || 0, name: profiles[e.user_id]?.display_name || profiles[e.user_id]?.email || '—' }))
    .sort((a, b) => b.points - a.points || a.submitted_at.localeCompare(b.submitted_at));

  lb.innerHTML = `
    <div style="display:grid;grid-template-columns:36px 1fr 1fr 70px;gap:8px;font-size:11px;color:var(--text-dim);letter-spacing:1px;padding:0 12px;">
      <div>#</div><div>TEAM NAME</div><div>OWNER</div><div style="text-align:right;">PTS</div>
    </div>
  ` + rows.map((r, i) => `
    <div style="display:grid;grid-template-columns:36px 1fr 1fr 70px;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;">
      <div style="font-weight:800;color:var(--accent);">${i + 1}</div>
      <div style="font-weight:700;">${escapeHtml(r.team_name)} <span style="color:var(--text-dim);font-weight:400;font-size:11px;">· ${r.formation}</span></div>
      <div style="color:var(--text-dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(r.name)}</div>
      <div style="text-align:right;font-weight:800;">${r.points}</div>
    </div>
  `).join('');
}

function escapeHtml(s){return String(s ?? '').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

init();
</script>
</body>
</html>
