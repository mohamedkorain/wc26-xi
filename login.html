<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · HALLO AMRIKA</title>
<link rel="stylesheet" href="styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
<header class="topbar">
  <a href="index.html" class="brand">
    <span class="brand-mark" data-i18n="brand.mark">HALLO AMRIKA</span>
  </a>
  <div class="hdr-right">
    <button class="hdr-btn" id="langToggle" title="عربي / English">عربي</button>
  </div>
</header>

<div id="lockBanner" data-i18n="lock.banner" style="display:none;background:linear-gradient(90deg,#1a1330,#2a1648);color:#fff;text-align:center;padding:12px 16px;font-size:14px;font-weight:600;border-bottom:1px solid var(--line);">
  🔒 Deadline passed — the site is updating. Check back soon for live standings.
</div>

<section class="setup" id="loginSection">
  <div class="setup-inner" style="max-width:420px;">
    <h1 class="setup-title" data-i18n="login.title">Sign in</h1>
    <p class="setup-sub" data-i18n="login.sub">We'll email you a one-tap login link. No password.</p>

    <button id="googleBtn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1f1f1f;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px;font-family:inherit;">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
      <span data-i18n="login.google">Sign in with Google</span>
    </button>

    <div style="margin:0 0 14px;display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:11px;letter-spacing:1px;">
      <span style="flex:1;border-top:1px solid var(--line);"></span>
      <span data-i18n="login.or">OR</span>
      <span style="flex:1;border-top:1px solid var(--line);"></span>
    </div>

    <form id="loginForm" style="display:flex;flex-direction:column;gap:12px;text-align:left;">
      <label style="font-size:12px;color:var(--text-dim);letter-spacing:1px;" data-i18n="login.email">EMAIL</label>
      <input type="email" id="emailInput" required placeholder="you@example.com" data-i18n-placeholder="login.placeholder"
             style="background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:12px;color:var(--text);font-size:15px;" />
      <button type="submit" class="setup-start" style="margin-top:8px;" data-i18n="login.send">Send magic link →</button>
    </form>

    <p id="loginMsg" style="margin-top:16px;color:var(--accent-2);font-size:13px;min-height:1.4em;"></p>
  </div>
</section>

<script type="module" src="js/i18n.js"></script>
<script type="module">
import { signInWithEmail, currentUser } from './js/auth.js';
import { supabase } from './js/supabase-client.js';
import { t } from './js/i18n.js';

// Post-lock UX: still allow sign-in (existing users need to view their squad
// & rank). Just show the banner above the form so visitors know submissions
// are closed.
const LOCK_AT = new Date('2026-06-11T19:00:00Z');
(async () => {
  const u = await currentUser();
  if (u) { location.href = 'team.html'; return; }
  if (new Date() >= LOCK_AT) {
    document.getElementById('lockBanner').style.display = 'block';
  }
})();

document.getElementById('googleBtn').onclick = async () => {
  const msg = document.getElementById('loginMsg');
  msg.style.color = 'var(--accent-2)';
  msg.textContent = '…';
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + '/build.html' },
  });
  if (error) {
    msg.style.color = 'var(--danger)';
    msg.textContent = error.message;
  }
};

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  const msg = document.getElementById('loginMsg');
  msg.style.color = 'var(--accent-2)';
  msg.textContent = t('login.sending');
  const { error } = await signInWithEmail(email, location.origin + '/build.html');
  if (error) {
    msg.style.color = 'var(--danger)';
    msg.textContent = error.message;
  } else {
    msg.textContent = t('login.sent', { email });
  }
};

</script>
</body>
</html>
